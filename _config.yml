# External plugins
# See http://ixti.net/software/2013/01/28/using-jekyll-plugins-on-github-pages.html for making `jekyll archives` work.
plugins:
  - jekyll-archives # Sorry, not GitHub pages friendly!
  - jekyll-sitemap
  - jekyll-paginate-v2
  - jekyll-include-cache
  - jekyll-remote-theme

exclude:
  - "/vendor/"

# Site settings
title               : Keeho Ahn
title_separator     : "-"
subtitle            : "Tech and something"
description         : ""
url                 : "http://keeho.pisttachi.io"
baseurl: "" # the subpath of your site, e.g. /blog/
logo                : "/assets/logo.png"

# Build settings
markdown: kramdown
inter_post_navigation: false
highlightjs_theme: "monokai-sublime"
remote_theme: "mmistakes/minimal-mistakes@4.21.0"

# Pagination Settings
# https://github.com/sverrirs/jekyll-paginate-v2/blob/master/README-GENERATOR.md#site-configuration
pagination:
  enabled: true
  per_page: 5
  permalink: "/page/:num/"
  sort_reverse: true

# Archive settings (see https://github.com/jekyll/jekyll-archives/)
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: 'archive'
  permalinks:
    category: '/category/:name/'
    tag: '/tag/:name/'

# Disqus comments
disqus_shortname: digsy89

# Google analytics
# ga_tracking_id: "UA-XXXX-1"

# Category descriptions (for archive pages)
category_list: [blog]
descriptions:
  - cat: Tech
    desc: "NLP and other ML tech"

  - cat: Personal
    desc: "Personal posting."

author:
    name: "Keeho Ahn"
    location: "Seoul"
    email: "digsy89@gmail.com"
    links:
      - label: "Github"
        icon: "fab fa-fw fa-github"
        url: "https://github.com/digsy89"
      - label: "LinkedIn"
        icon: "fab fa-fw fa-linkedin"
        url: "https://www.linkedin.com/in/keehoahn/"

footer:
    links:
      - label: "Email"
        icon: "fas fa-fw fa-envelope-square"
        url: "mailto:digsy89@gmail.com"
      - label: "Github"
        icon: "fab fa-fw fa-github"
        url: "https://github.com/digsy89"
      - label: "LinkedIn"
        icon: "fab fa-fw fa-linkedin"
        url: "https://www.linkedin.com/in/keehoahn/"


social:
  - name: GitHub
    icon: github
    username: digsy89
    url: https://github.com/digsy89
    desc: Fork me on GitHub
    share: false

  - name: LinkedIn
    icon: linkedin
    username: Keeho Ahn
    url: https://www.linkedin.com/in/keeho-ahn-2b8415144/
    desc: Connect with me on LinkedIn
    share: true

  - name: SoundCloud
    icon: soundcloud
    username: digsy89
    url: https://soundcloud.com/digsy89
    desc: Follow me on SoundCloud
    share: false

# Social sharing protocols
# These are for automatically generating sharing metadata for FB and Twitter
# OS Protocol is for sharing the source of your site, if you're interested. For more, see osprotocol.com
protocols:
    fb_image: "/assets/logo.png"
    fb_image_width: 612
    fb_image_height: 605
    fb_image_type: "image/png"

    twitter_image: "/assets/logo.png"

    os_repo: "https://github.com/bencentra/centrarium.com"
    os_rcs_type: "git"
    os_src: "git@github.com:bencentra/centrarium.com.git"
